<script>
// Bloqueios de segurança e proteção de conteúdo
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
  // Bloqueia F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S, Ctrl+C, Ctrl+P, Ctrl+Shift+C
  if (
    e.key === 'F12' ||
    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C')) ||
    (e.ctrlKey && (e.key === 'U' || e.key === 'S' || e.key === 'C' || e.key === 'P'))
  ) {
    e.preventDefault();
    return false;
  }
});
// Bloqueia seleção de texto
document.addEventListener('selectstart', e => e.preventDefault());
// Bloqueia PrintScreen
document.addEventListener('keyup', function(e) {
  if (e.key === 'PrintScreen') {
    navigator.clipboard.writeText('Ação bloqueada');
    alert('Captura de tela bloqueada!');
  }
});
// Bloqueia impressão
window.onbeforeprint = () => { alert('Impressão bloqueada!'); return false; };
</script>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── STATE ────────────────────────────────────────────────────────────────────
let pdfDoc = null;
let totalPages = 0;
let currentPage = 1;
let scale = 1.0;
let viewMode = 'all'; // 'all' | 'single'
let rendering = false;
// ─── PDF LOAD FROM FILE ───────────────────────────────────────────────────────

// Carrega o PDF diretamente do arquivo usando PDF.js
async function loadPDFfromFile() {
  try {
    setLoadBar(10);
    const loadingTask = pdfjsLib.getDocument('planejamento-classe-agrupadas.pdf');
    loadingTask.onProgress = (p) => {
      if (p.total) setLoadBar(50 + Math.round((p.loaded / p.total) * 35));
    };
    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;
    setLoadBar(90);
    updatePageInfo();
    await renderAllPages();
    setLoadBar(100);
    setTimeout(() => {
      document.getElementById('loadingOverlay').style.display = 'none';
    }, 300);
    updateNavButtons();
  } catch(err) {
    console.error('PDF init error:', err);
    document.getElementById('loadingOverlay').innerHTML = `
      <i class="fas fa-exclamation-circle" style="font-size:2rem;color:#EF4444;"></i>
      <p style="color:#9CA3AF;font-family:'DM Sans',sans-serif;">Erro ao carregar o documento.<br><small>${err.message}</small></p>`;
  }
}

// Chama o carregamento ao iniciar
window.addEventListener('DOMContentLoaded', loadPDFfromFile);

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function initViewer() {
  try {
    setLoadBar(20);
    const raw = atob(PDF_DATA);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    setLoadBar(50);
    const loadingTask = pdfjsLib.getDocument({ data: bytes });
    loadingTask.onProgress = (p) => {
      if (p.total) setLoadBar(50 + Math.round((p.loaded / p.total) * 35));
    };
    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;
    setLoadBar(90);
    updatePageInfo();
    await renderAllPages();
    setLoadBar(100);
    setTimeout(() => {
      document.getElementById('loadingOverlay').style.display = 'none';
    }, 300);
    updateNavButtons();
  } catch(err) {
    console.error('PDF init error:', err);
    document.getElementById('loadingOverlay').innerHTML = `
      <i class="fas fa-exclamation-circle" style="font-size:2rem;color:#EF4444;"></i>
      <p style="color:#9CA3AF;font-family:'DM Sans',sans-serif;">Erro ao carregar o documento.<br><small>${err.message}</small></p>`;
  }
}

function setLoadBar(pct) {
  const bar = document.getElementById('loadBar');
  if (bar) bar.style.width = pct + '%';
}

// ─── RENDER ALL PAGES ─────────────────────────────────────────────────────────
async function renderAllPages() {
  const area = document.getElementById('canvasArea');
  area.innerHTML = '';
  for (let p = 1; p <= totalPages; p++) {
    const wrap = buildPageWrapper(p);
    area.appendChild(wrap);
    await renderPage(p, wrap.querySelector('canvas'));
    if (viewMode === 'single' && p !== currentPage) {
      wrap.style.display = 'none';
    }
  }
}

function buildPageWrapper(p) {
  const wrap = document.createElement('div');
  wrap.className = 'page-wrap';
  wrap.id = 'pw' + p;

  const canvas = document.createElement('canvas');
  canvas.id = 'pc' + p;

  // Page number label
  const num = document.createElement('div');
  num.className = 'page-num';
  num.textContent = `Página ${p} de ${totalPages}`;

  // Protection overlay — blocks right-click, drag, selection
  const overlay = document.createElement('div');
  overlay.className = 'prot-overlay';
  overlay.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showProtMsg(); });
  overlay.addEventListener('mousedown', e => { if (e.button !== 0) e.preventDefault(); });
  overlay.addEventListener('dragstart', e => e.preventDefault());
  overlay.addEventListener('selectstart', e => e.preventDefault());
  overlay.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

  wrap.appendChild(canvas);
  wrap.appendChild(num);
  wrap.appendChild(overlay);
  return wrap;
}

// ─── RENDER SINGLE PAGE ───────────────────────────────────────────────────────
async function renderPage(pageNum, canvas) {
  try {
    const page = await pdfDoc.getPage(pageNum);
    const viewport = page.getViewport({ scale });
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
  } catch(e) {
    console.error(`Render error page ${pageNum}:`, e);
  }
}

// ─── RE-RENDER ALL (on zoom change) ──────────────────────────────────────────
async function reRender() {
  if (rendering) return;
  rendering = true;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').innerHTML = '<div class="spinner"></div><p style="color:#9CA3AF;font-family:\'DM Sans\',sans-serif;font-size:13px;">Aplicando zoom...</p>';
  await new Promise(r => setTimeout(r, 40));
  for (let p = 1; p <= totalPages; p++) {
    const canvas = document.getElementById('pc' + p);
    if (canvas) await renderPage(p, canvas);
  }
  document.getElementById('loadingOverlay').style.display = 'none';
  rendering = false;
  if (viewMode === 'single') scrollToPage(currentPage);
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function changePage(delta) {
  const np = currentPage + delta;
  if (np >= 1 && np <= totalPages) goToPage(np);
}
function goToPage(n) {
  n = Math.min(Math.max(n, 1), totalPages);
  currentPage = n;
  updatePageInfo();
  updateNavButtons();
  if (viewMode === 'single') {
    for (let p = 1; p <= totalPages; p++) {
      const pw = document.getElementById('pw' + p);
      if (pw) pw.style.display = p === n ? 'block' : 'none';
    }
  } else {
    scrollToPage(n);
  }
}
function goToPageLast() { goToPage(totalPages); }
function scrollToPage(n) {
  const el = document.getElementById('pw' + n);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function updatePageInfo() {
  document.getElementById('pageInfo').textContent = totalPages ? `${currentPage} / ${totalPages}` : '– / –';
}
function updateNavButtons() {
  document.getElementById('btnFirst').disabled = currentPage <= 1;
  document.getElementById('btnPrev').disabled = currentPage <= 1;
  document.getElementById('btnNext').disabled = currentPage >= totalPages;
  document.getElementById('btnLast').disabled = currentPage >= totalPages;
}

// ─── ZOOM ─────────────────────────────────────────────────────────────────────
function adjustZoom(delta) {
  const ns = Math.round((scale + delta) * 100) / 100;
  applyZoom(Math.min(Math.max(ns, 0.25), 3.0));
}
function applyZoom(val) {
  scale = parseFloat(val);
  const sel = document.getElementById('zoomSelect');
  const match = Array.from(sel.options).find(o => Math.abs(parseFloat(o.value) - scale) < 0.005);
  if (match) sel.value = match.value;
  reRender();
}
function fitToWindow() {
  const area = document.getElementById('canvasArea');
  const w = area.clientWidth - 48;
  if (!pdfDoc) return;
  pdfDoc.getPage(1).then(pg => {
    const vp = pg.getViewport({ scale: 1 });
    const fit = Math.round((w / vp.width) * 100) / 100;
    applyZoom(Math.min(fit, 2.0));
  });
}

// ─── VIEW MODE ────────────────────────────────────────────────────────────────
function setMode(mode) {
  viewMode = mode;
  document.getElementById('btnModeSingle').classList.toggle('active', mode === 'single');
  document.getElementById('btnModeAll').classList.toggle('active', mode === 'all');
  if (mode === 'all') {
    for (let p = 1; p <= totalPages; p++) {
      const pw = document.getElementById('pw' + p);
      if (pw) pw.style.display = 'block';
    }
    scrollToPage(currentPage);
  } else {
    goToPage(currentPage);
  }
}

// ─── PROTECTION ───────────────────────────────────────────────────────────────
function showProtMsg() {
  Swal.fire({
    title: '🔒 Documento Protegido',
    text: 'Este documento é de uso exclusivo para visualização. Download, impressão e cópia não são permitidos.',
    icon: 'warning',
    confirmButtonText: 'Entendido',
    confirmButtonColor: '#C9A84C',
    background: '#161B22',
    color: '#F5F0E8'
  });
}

// Global protection
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.ctrlKey && ['s','p','u','a'].includes(e.key.toLowerCase())) { e.preventDefault(); showProtMsg(); }
  if (e.ctrlKey && (e.key === '+' || e.key === '=')) { e.preventDefault(); adjustZoom(0.25); }
  if (e.ctrlKey && e.key === '-') { e.preventDefault(); adjustZoom(-0.25); }
  if (e.key === 'ArrowRight' || e.key === 'PageDown') changePage(1);
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') changePage(-1);
  if (e.key === 'Home') goToPage(1);
  if (e.key === 'End') goToPageLast();
});
window.onbeforeprint = e => { e.preventDefault(); showProtMsg(); };

// ─── THEME ────────────────────────────────────────────────────────────────────
let isLight = localStorage.getItem('theme') === 'light';
function applyTheme() {
  document.body.classList.toggle('light', isLight);
  document.getElementById('themeIcon').className = isLight ? 'fas fa-sun' : 'fas fa-moon';
}
function toggleTheme() { isLight = !isLight; localStorage.setItem('theme', isLight ? 'light' : 'dark'); applyTheme(); }
applyTheme();

// ─── MOBILE MENU ─────────────────────────────────────────────────────────────
let menuOpen = false;
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('mobileMenu').classList.toggle('open', menuOpen);
  document.getElementById('menuIcon').className = menuOpen ? 'fas fa-times' : 'fas fa-bars';
}
function closeMenu() { menuOpen = false; document.getElementById('mobileMenu').classList.remove('open'); document.getElementById('menuIcon').className = 'fas fa-bars'; }

// ─── RESPONSIVE ───────────────────────────────────────────────────────────────
function checkLayout() {
  const isMd = window.innerWidth >= 768;
  const dn = document.getElementById('desktopNav');
  const bn = document.getElementById('breadNav');
  const bs = document.getElementById('breadSep');
  if (dn) dn.style.display = isMd ? 'flex' : 'none';
  if (bn) bn.style.display = isMd ? 'flex' : 'none';
  if (bs) bs.style.display = isMd ? 'block' : 'none';
}
checkLayout();
window.addEventListener('resize', checkLayout);

// ─── INTERSECTION OBSERVER (track current page) ───────────────────────────────
function initPageObserver() {
  if (!('IntersectionObserver' in window)) return;
  const opts = { root: null, rootMargin: '-40% 0px -40% 0px', threshold: 0 };
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting && viewMode === 'all') {
        const id = parseInt(e.target.id.replace('pw', ''));
        if (!isNaN(id)) { currentPage = id; updatePageInfo(); updateNavButtons(); }
      }
    });
  }, opts);
  for (let p = 1; p <= totalPages; p++) {
    const el = document.getElementById('pw' + p);
    if (el) obs.observe(el);
  }
}

// ─── START ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await initViewer();
  initPageObserver();
});
</script>
